services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sobral}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sobral_pass}
      POSTGRES_DB: ${POSTGRES_DB:-sobral}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sobral}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: node:20-alpine
    working_dir: /app/server
    command: node --watch src/server.js
    volumes:
      - ./server:/app/server
      - ./public/images/produtos:/app/public/images/produtos
      - /app/server/node_modules
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sobral}:${POSTGRES_PASSWORD:-sobral_pass}@db:5432/${POSTGRES_DB:-sobral}
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: npm run dev -- --host
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: http://app:3001
    depends_on:
      - app

volumes:
  db_data:
