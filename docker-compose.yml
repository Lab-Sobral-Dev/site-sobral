services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sobral}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sobral_pass}
      POSTGRES_DB: ${POSTGRES_DB:-sobral}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sobral}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - uploads:/app/public/images/produtos
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-sobral}:${POSTGRES_PASSWORD:-sobral_pass}@db:5432/${POSTGRES_DB:-sobral}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
  uploads:
