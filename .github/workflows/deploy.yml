name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy na VPS
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /home/suporte/projetos/site-sobral
            echo "[1/4] git pull..."
            git pull origin main
            echo "[2/4] docker compose up --build..."
            docker compose up --build -d
            echo "[3/4] migrations..."
            docker compose exec -T app node server/src/db/migrate.js || true
            echo "[4/4] Deploy concluído em $(date)"
